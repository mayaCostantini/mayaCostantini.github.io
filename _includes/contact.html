<section id="contact" class="section section-contact">
  <div class="container">
    <h2 class="section-heading">Let's Connect</h2>

    <!-- Featured Blog -->
    <div class="blog-feature">
      <h3><i class="fas fa-microchip"></i> {{ site.blog_name }}</h3>
      <p>Read my technical blog about software architecture, security, and engineering practices.</p>
      <a href="{{ site.blog }}" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">
        Visit Blog
      </a>
    </div>

    <!-- Social Links -->
    <div class="social-links">
      {% for link in site.data.social %}
        <a href="{{ link.url }}" class="social-link" {% if link.url contains 'http' %}target="_blank" rel="noopener noreferrer"{% endif %}>
          <i class="{{ link.icon }}"></i>
          <span>{{ link.platform }}</span>
        </a>
      {% endfor %}
    </div>

    <!-- Resume -->
    <div class="resume-link">
      <p>Interested in my background? <a href="mailto:maya.costantini@protonmail.com">Email me</a> for my resume.</p>
    </div>
  </div>
</section>
